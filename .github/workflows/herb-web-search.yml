name: Herb Web Search

on:
  repository_dispatch:
    types: [herb-web-search]
  workflow_dispatch:
    inputs:
      mandate_json:
        description: 'Mandate JSON'
        required: true

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q supabase

      - name: Configure environment
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPEDRIVE_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
          PIPEDRIVE_DOMAIN: icoscapital
        run: |
          echo "Environment configured"

      - name: Extract mandate from dispatch
        id: mandate
        run: |
          MANDATE='${{ github.event.client_payload.mandate }}'
          echo "mandate=$MANDATE" >> $GITHUB_OUTPUT

      - name: Run Herb search
        if: steps.mandate.outputs.mandate != ''
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPEDRIVE_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
          PIPEDRIVE_DOMAIN: icoscapital
        run: |
          python -m scripts.herb_web_run '${{ steps.mandate.outputs.mandate }}'

      - name: Handle search failure
        if: failure()
        run: |
          echo "Search execution failed - check logs above"
